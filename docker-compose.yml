services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://intelliextract:intelliextract@postgres:5432/intelliextract
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/storage
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ["uv", "run", "rq", "worker", "--url", "redis://redis:6379/0", "default"]
    environment:
      DATABASE_URL: postgresql+asyncpg://intelliextract:intelliextract@postgres:5432/intelliextract
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/storage
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intelliextract
      POSTGRES_PASSWORD: intelliextract
      POSTGRES_DB: intelliextract
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
